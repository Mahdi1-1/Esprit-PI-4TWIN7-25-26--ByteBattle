apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: bytebattle
data:
  bytebattle-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "options": { "0": { "index": 0, "text": "DOWN" }, "1": { "index": 1, "text": "UP" } }, "type": "value" }
              ],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": 0 }, { "color": "green", "value": 1 } ] }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [ { "datasource": "Prometheus", "editorMode": "code", "expr": "up{job=\"bytebattle-backend\"}", "instant": true, "legendFormat": "backend", "range": false, "refId": "A" } ],
          "title": "Backend Target",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "options": { "0": { "index": 0, "text": "DOWN" }, "1": { "index": 1, "text": "UP" } }, "type": "value" }
              ],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": 0 }, { "color": "green", "value": 1 } ] }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "options": { "colorMode": "value", "graphMode": "none", "justifyMode": "auto", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [ { "datasource": "Prometheus", "editorMode": "code", "expr": "up{job=\"bytebattle-judge-worker\"}", "instant": true, "legendFormat": "judge", "range": false, "refId": "A" } ],
          "title": "Judge Target",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 0 },
          "id": 3,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [ { "datasource": "Prometheus", "editorMode": "code", "expr": "bytebattle_backend_uptime_seconds", "instant": false, "legendFormat": "backend", "range": true, "refId": "A" } ],
          "title": "Backend Uptime",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 0 },
          "id": 4,
          "options": { "colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "targets": [ { "datasource": "Prometheus", "editorMode": "code", "expr": "bytebattle_judge_uptime_seconds", "instant": false, "legendFormat": "judge", "range": true, "refId": "A" } ],
          "title": "Judge Uptime",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "id": 5,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "single" } },
          "targets": [
            { "datasource": "Prometheus", "editorMode": "code", "expr": "process_resident_memory_bytes{job=\"bytebattle-backend\"}", "legendFormat": "backend", "range": true, "refId": "A" },
            { "datasource": "Prometheus", "editorMode": "code", "expr": "process_resident_memory_bytes{job=\"bytebattle-judge-worker\"}", "legendFormat": "judge", "range": true, "refId": "B" }
          ],
          "title": "Resident Memory",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "id": 6,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "single" } },
          "targets": [
            { "datasource": "Prometheus", "editorMode": "code", "expr": "bytebattle_judge_queue_waiting", "legendFormat": "waiting", "range": true, "refId": "A" },
            { "datasource": "Prometheus", "editorMode": "code", "expr": "bytebattle_judge_queue_active", "legendFormat": "active", "range": true, "refId": "B" },
            { "datasource": "Prometheus", "editorMode": "code", "expr": "bytebattle_judge_queue_failed", "legendFormat": "failed", "range": true, "refId": "C" }
          ],
          "title": "Judge Queue Health",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["bytebattle", "overview"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timezone": "browser",
      "title": "ByteBattle Overview",
      "uid": "bytebattle-overview",
      "version": 1,
      "weekStart": ""
    }
