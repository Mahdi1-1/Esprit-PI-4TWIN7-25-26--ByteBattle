apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: bytebattle
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'bytebattle-backend'
        metrics_path: /metrics
        static_configs:
          - targets: ['backend-service:4001']

      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: '(node-exporter|prometheus-node-exporter)'
