apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: bytebattle
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alerting_rules.yml

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'bytebattle-backend'
        metrics_path: /api/metrics
        static_configs:
          - targets: ['backend-service:4001']

      - job_name: 'bytebattle-judge-worker'
        metrics_path: /metrics
        static_configs:
          - targets: ['judge-service:3000']

      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: '(node-exporter|prometheus-node-exporter)'
  alerting_rules.yml: |
    groups:
      - name: bytebattle-alerts
        rules:
          - alert: ByteBattleBackendDown
            expr: up{job="bytebattle-backend"} == 0
            for: 1m
            labels:
              severity: critical
              service: backend
            annotations:
              summary: "Backend unavailable"
              description: "Prometheus ne peut plus scrapper bytebattle-backend depuis 1 minute."

          - alert: ByteBattleJudgeWorkerDown
            expr: up{job="bytebattle-judge-worker"} == 0
            for: 1m
            labels:
              severity: critical
              service: judge-worker
            annotations:
              summary: "Judge worker unavailable"
              description: "Prometheus ne peut plus scrapper bytebattle-judge-worker depuis 1 minute."

          - alert: ByteBattleJudgeQueueBacklog
            expr: bytebattle_judge_queue_waiting > 10
            for: 5m
            labels:
              severity: warning
              service: judge-worker
            annotations:
              summary: "Judge queue backlog"
              description: "La file d'attente du judge dépasse 10 jobs depuis 5 minutes."

          - alert: ByteBattleJudgeFailedJobs
            expr: bytebattle_judge_queue_failed > 0
            for: 2m
            labels:
              severity: warning
              service: judge-worker
            annotations:
              summary: "Judge jobs failing"
              description: "Le judge worker remonte au moins un job en échec depuis 2 minutes."

          - alert: ByteBattleBackendHighMemory
            expr: process_resident_memory_bytes{job="bytebattle-backend"} > 250000000
            for: 5m
            labels:
              severity: warning
              service: backend
            annotations:
              summary: "Backend memory high"
              description: "La mémoire RSS du backend dépasse 250 MB depuis 5 minutes."
