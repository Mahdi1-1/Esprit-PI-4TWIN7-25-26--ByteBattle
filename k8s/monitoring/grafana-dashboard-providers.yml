apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: bytebattle
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: ByteBattle Dashboards
        orgId: 1
        folder: ByteBattle
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/bytebattle
