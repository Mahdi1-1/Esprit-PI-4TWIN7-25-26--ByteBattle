apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: bytebattle
data:
  PORT: "4001"
  HOST: "0.0.0.0"
  NODE_ENV: "production"
  FRONTEND_URL: "http://bytebattle.local"
  PUBLIC_FRONTEND_URL: "http://bytebattle.local"
  PUBLIC_API_URL: "http://backend-service:4001"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  MONGO_URI: "mongodb://mongodb-service:27017/bytebattle?directConnection=true"
  DATABASE_URL: "mongodb://mongodb-service:27017/bytebattle?directConnection=true"

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: bytebattle
type: Opaque
stringData:
  JWT_SECRET: "changeme-super-secret-key-bytebattle-2026"
  JWT_EXPIRES_IN: "7d"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: bytebattle
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4001"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        kubernetes.io/hostname: adam-vm
      containers:
        - name: backend
          image: mahdimasmoudi/bytebattle-backend:latest
          ports:
            - containerPort: 4001
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/challenges
              port: 4001
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/challenges
              port: 4001
            initialDelaySeconds: 15
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: bytebattle
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 4001
      targetPort: 4001
      protocol: TCP
