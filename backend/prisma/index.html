<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logo BB League</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 25%, #18202c 0%, #0b1017 40%, #030406 100%);
      font-family: Arial, Helvetica, sans-serif;
    }

    .logo-wrap {
      width: min(330px, 88vw);
    }

    .logo {
      display: block;
      width: 100%;
      height: auto;
    }

    .outer-shield {
      fill: url(#shieldFill);
      stroke: url(#outerStroke);
      stroke-width: 3;
    }

    .inner-frame {
      fill: none;
      stroke: url(#frameGlow);
      stroke-width: 13;
      stroke-linejoin: round;
    }

    .inner-frame-thin {
      fill: none;
      stroke: url(#frameHot);
      stroke-width: 2.5;
      opacity: 0.95;
    }

    .panel {
      fill: url(#panelFill);
    }

    .banner {
      fill: url(#bannerFill);
      stroke: url(#bannerStroke);
      stroke-width: 2.2;
    }

    .banner-inner {
      fill: none;
      stroke: rgba(255, 255, 255, 0.12);
      stroke-width: 1.1;
    }

    .mono {
      font-family: Impact, "Arial Black", sans-serif;
      font-weight: 900;
      fill: url(#monoFill);
      stroke: #1a1113;
      stroke-width: 4;
      paint-order: stroke fill;
      letter-spacing: -5px;
    }

    .league {
      font-family: Impact, "Arial Black", sans-serif;
      font-weight: 900;
      font-size: 29px;
      letter-spacing: 1.3px;
      fill: #f7efe4;
      text-anchor: middle;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <svg
      class="logo"
      viewBox="0 0 420 470"
      xmlns="http://www.w3.org/2000/svg"
      aria-label="Logo BB League"
    >
      <defs>
        <linearGradient id="shieldFill" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#232c39" />
          <stop offset="45%" stop-color="#2d3746" />
          <stop offset="100%" stop-color="#171d27" />
        </linearGradient>

        <linearGradient id="outerStroke" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#6f7988" />
          <stop offset="50%" stop-color="#475160" />
          <stop offset="100%" stop-color="#252d39" />
        </linearGradient>

        <linearGradient id="frameGlow" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#f4a12f" />
          <stop offset="45%" stop-color="#eb7737" />
          <stop offset="100%" stop-color="#ff4f59" />
        </linearGradient>

        <linearGradient id="frameHot" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#ffd66d" />
          <stop offset="50%" stop-color="#ff8b3c" />
          <stop offset="100%" stop-color="#ff5d64" />
        </linearGradient>

        <linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#151c27" />
          <stop offset="100%" stop-color="#0f141d" />
        </linearGradient>

        <linearGradient id="topShine" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18" />
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
        </linearGradient>

        <linearGradient id="monoFill" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ffc342" />
          <stop offset="45%" stop-color="#f07b37" />
          <stop offset="100%" stop-color="#ff4e5c" />
        </linearGradient>

        <linearGradient id="bannerFill" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#293240" />
          <stop offset="100%" stop-color="#151c24" />
        </linearGradient>

        <linearGradient id="bannerStroke" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#6c7786" />
          <stop offset="100%" stop-color="#2d3542" />
        </linearGradient>

        <linearGradient id="bottomGlow" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#ff7c47" />
          <stop offset="50%" stop-color="#ff4a58" />
          <stop offset="100%" stop-color="#ff7c47" />
        </linearGradient>

        <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
          <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.55" />
        </filter>

        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ff973f" flood-opacity="0.55" />
          <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ff4e59" flood-opacity="0.16" />
        </filter>

        <clipPath id="panelClip">
          <path d="M210 71 C269 71 307 86 317 108 V202 C317 277 269 333 210 383 C151 333 103 277 103 202 V108 C113 86 151 71 210 71 Z" />
        </clipPath>
      </defs>

      <g filter="url(#shadow)">
        <path
          class="outer-shield"
          d="M210 34
             C286 34 337 57 349 86
             V205
             C349 301 292 369 210 428
             C128 369 71 301 71 205
             V86
             C83 57 134 34 210 34 Z"
        />

        <path
          class="inner-frame"
          d="M210 53
             C276 53 320 72 331 96
             V203
             C331 289 280 351 210 404
             C140 351 89 289 89 203
             V96
             C100 72 144 53 210 53 Z"
        />

        <path
          class="inner-frame-thin"
          d="M210 60
             C272 60 313 77 323 99
             V202
             C323 284 276 342 210 394
             C144 342 97 284 97 202
             V99
             C107 77 148 60 210 60 Z"
        />

        <path
          class="panel"
          d="M210 71
             C269 71 307 86 317 108
             V202
             C317 277 269 333 210 383
             C151 333 103 277 103 202
             V108
             C113 86 151 71 210 71 Z"
        />

        <g clip-path="url(#panelClip)">
          <path
            d="M105 90 C160 74 260 74 315 90 L315 125 C255 108 165 108 105 125 Z"
            fill="url(#topShine)"
          />
          <ellipse cx="210" cy="155" rx="112" ry="54" fill="#ffffff" opacity="0.03" />
          <ellipse cx="210" cy="360" rx="115" ry="38" fill="#000000" opacity="0.20" />
        </g>

        <g filter="url(#glow)">
          <text class="mono" x="116" y="193" font-size="112">[B</text>
          <text class="mono" x="177" y="222" font-size="108">B]</text>
        </g>

        <path
          class="banner"
          d="M76 218
             H126
             L137 206
             H283
             L294 218
             H344
             L334 268
             H86 Z"
        />

        <path
          class="banner-inner"
          d="M100 230 H320 L313 258 H107 Z"
        />

        <text class="league" x="210" y="252">BB LEAGUE</text>

        <path
          d="M142 301 Q210 352 278 301"
          fill="none"
          stroke="url(#bottomGlow)"
          stroke-width="9"
          stroke-linecap="round"
          opacity="0.95"
        />

        <path
          d="M157 302 Q210 340 263 302"
          fill="none"
          stroke="#ffb54b"
          stroke-width="2.8"
          stroke-linecap="round"
          opacity="0.58"
        />
      </g>
    </svg>
  </div>
</body>
</html>
